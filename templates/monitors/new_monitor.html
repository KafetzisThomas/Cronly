{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}New Monitor{% endblock title %}

{% block content %}
    <div class="container mt-5">
        <h4>New Monitor</h4>
        <hr class="border-dark">

        <form action="{% url 'monitors:new_monitor' %}" method="POST">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-info w-100">Save</button>
        </form>
    </div>

    <script>
        const intervalSelect = document.getElementById('id_interval');
        const customInput = document.getElementById('id_custom_interval');

        intervalSelect.addEventListener('change', () => {
            if (intervalSelect.value === 'custom') {
                customInput.style.display = 'block';
            } else {
                customInput.style.display = 'none';
            }
        });
    </script>
{% endblock content %}
